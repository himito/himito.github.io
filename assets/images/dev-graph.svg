    <g opacity="0.22">
      <rect x="878" y="198" width="210" height="86" rx="10" fill="#0f172a" stroke="#9fc0ff"/>
      <text x="898" y="225" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#dce7ff">explore(state)</text>
      <text x="898" y="249" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#9fc0ff">  enqueue(successors)</text>
      <text x="898" y="273" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#66d7c6">  verify(invariant)</text>
