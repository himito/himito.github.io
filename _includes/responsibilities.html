<section class="resume-educate-section resume-section">
  <h3 class="resume-section-heading text-uppercase py-2 py-lg-3 py-3">
    <i class="resume-section-heading-icon bi bi-list-task me-2"></i>
    Responsibilities
  </h3>
  <ul class="resp-list list-unstyled mb-0">
    {% for item in site.data.responsibilities %}
    {% assign parts = item.period | split: " - " %}
    <li class="resp-row">
      <div class="resp-row-head">
        <span class="resp-title">{{ item.title }}</span>
        <span class="resp-period{% if item.period contains 'current' %} resp-period-now{% endif %}">
          {% if item.period contains 'current' %}Since {{ parts[0] }}{% else %}{{ parts[0] }}–{{ parts[1] }}{% endif %}
        </span>
      </div>
      <div class="resp-org">{{ item.institution }}</div>
    </li>
    {% endfor %}
  </ul>
</section>
<!--//resume-section-->
