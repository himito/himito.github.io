<div class="resume-header px-4 px-lg-5">
  <div class="resume-profile-holder text-center">
    <!-- photo -->
    <img class="resume-profile-pic rounded-circle" src="{{ "assets/images/profile.png" | relative_url }}" alt="image">

    <h2 class="resume-name text-uppercase">{{ site.title }}</h2>
    <div class="resume-role-title text-uppercase">{{ site.position }}</div>
    <div class="resume-contact mt-4">
      <ul class="resume-contact-list list-unstyled list-inline mb-0 justify-content-between">
        <li class="list-inline-item me-md-3 me-lg-5">
          <i class="resume-contact-icon bi bi-building me-2"></i>
          {{ site.office }}
        </li>
        <li class="list-inline-item me-md-3 me-lg-5">
          <i class="resume-contact-icon bi bi-envelope me-2"></i>
          <!-- Email is stored reversed and rebuilt by JS to thwart scrapers -->
          <a
            class="resume-contact-email"
            href="#"
            data-rev="{{ site.email | split: '' | reverse | join: '' }}"
            aria-label="Email"
            >contact me by email</a
          >
        </li>
        <li class="list-inline-item me-lg-5">
          <i class="resume-contact-icon bi bi-globe me-2"></i>
          {{ site.website }}
        </li>
      </ul>
    </div>
    <!--//resume-contact-->
  </div>
  <!--//profile-holder-->
</div>
<!--//resume-header-->

<script>
  // Rebuild the email address from its reversed form so it is never present
  // as plain text in the HTML source (defeats most automated harvesters).
  (function () {
    document.querySelectorAll("a.resume-contact-email[data-rev]").forEach(function (el) {
      var addr = el.getAttribute("data-rev").split("").reverse().join("");
      el.setAttribute("href", "mailto:" + addr);
      el.textContent = addr;
    });
  })();
</script>
