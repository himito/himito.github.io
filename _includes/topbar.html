<nav class="top-bar text-center position-relative" aria-label="External profiles">
  <div class="top-bar-inner">
    <ul class="social-list list-inline mx-auto">
      {% for item in site.data.social%}
      <li class="list-inline-item">
        <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer" title="{{ item.name }}" aria-label="{{ item.name }}">
          <i class="{{ item.icon }}" aria-hidden="true"></i>
        </a>
      </li>
      {% endfor %}
    </ul>
    <!--//social-list-->
  </div>
  <!--//top-bar-inner-->
</nav>
<!--//top-bar-->
